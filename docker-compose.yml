version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: security-edu-db
    restart: always
    environment:
      POSTGRES_DB: ionesdb
      POSTGRES_USER: iones
      POSTGRES_PASSWORD: Hansoliones1!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /home/ionesadmin/security-edu-new/server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iones -d ionesdb']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: /home/ionesadmin/security-edu-new/server
      dockerfile: Dockerfile
    container_name: security-edu-server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - /home/ionesadmin/security-edu-new/server/.env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - '4000:4000'

volumes:
  postgres_data:
  uploads_data:
